<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>YouTube</title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/x-icon" href="google_fav2.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="content">
      <div class="img-header">
        <img src="google_logo.svg" />
      </div>
      <h2>Sign in</h2>
      <h4>to continue to Youtube</h4>
      <form>
        <fieldset>
          <legend>Email or phone</legend>
          <input type="email" />
        </fieldset>
        <a href="#" class="details forgot-im">Forgot Email?</a>

        <p class="details guest">
          Not your computer? Use Guest mode to sign in privately. <br />
          <a href="#">Learn more about using Guest mode.</a>
        </p>
        <div class="buttons">
          <a href="#" class="details">Create Account</a>
          <button type="submit">Next</button>
        </div>
      </form>
    </div>
    <script src="" async defer></script>
  </body>
</html>
